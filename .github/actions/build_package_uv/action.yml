name: build_package_with_uv
description: build package

runs:
  using: 'composite'
  
  steps:
    - uses: actions/download-artifact@v8

    - name: install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        python-version: '3.14'

    - name: build package
      shell: bash
      run: |
        uv build
        rm dist/*.whl
        ls -la
        ls -la dist
        mv dist/mountwizzard4*.* dist/mountwizzard4.tar.gz
