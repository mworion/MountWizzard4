name: setup test coverage
description: download package install and install test environment for coverage

runs:
  using: 'composite'
  steps:

    - name: install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: '3.13'

    - name: install #1
      run: |        
        uv venv -p 3.13
        uv pip install -e .
        uv pip install cython wheel comtypes==1.4.16  pytest pytest-qt pytest-cov
      shell: bash
