name: test_scripts_pypi

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: True

env:
  version: '4.0.0b17'

on:
  push:
    paths:
      - '.github/workflows/test_scripts_pypi.yml'
      - 'pyproject.toml'

jobs:
  
  install_windows:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 4
      matrix:
        os: [windows-2022, windows-2025]
        python-version: [ '3.12', '3.14' ]

    steps:
      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
     
      - name: MountWizzard4
        shell: cmd
        run: |
          uv venv -p ${{ matrix.python-version }}
          uv pip install mountwizzard4==${{ env.version }}
          uv run mw4 -t 1
          dir
  
  install_ubuntu:
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen

    strategy:
      max-parallel: 4
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04]
        python-version: [ '3.12', '3.14' ]

    steps:
      - uses: actions/checkout@v6
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libpulse0

      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          
      - name: MountWizzard4
        run: |
          uv venv -p ${{ matrix.python-version }}
          uv pip install mountwizzard4==${{ env.version }}
          uv run mw4 -t 1
          ls -la
 
          
  install_macOS:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 6
      matrix:
        os: [macos-15, macos-15-intel , macos-26]
        python-version: ['3.12', '3.14']
    
    steps:
      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          
      - name: MountWizzard4
        run: |
          uv venv -p ${{ matrix.python-version }}
          uv pip install mountwizzard4==${{ env.version }}
          uv run mw4 -t 1
          ls -la
          