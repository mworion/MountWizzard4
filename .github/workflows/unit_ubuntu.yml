name: unit_ubuntu
concurrency:
  group: "${{ github.ref }}-${{ github.workflow }}"
  cancel-in-progress: true

on:
  push:
    # Run this action on the trigger event when specific files are touched
    paths:
      - 'src/mw4/**'
      - 'tests/unit_tests/**'
      - 'pyproject.toml'
      - '.github/workflows/unit_ubuntu.yml'
      - '.github/actions/install_ubuntu_head/action.yml'
      - '.github/actions/build_package_uv/action.yml'
      - '.github/actions/setup_test/action.yml'

jobs:
  build_package:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - name: build package
        uses: ./.github/actions/build_package_uv
        
  run_tests_ubuntu_0:
    needs: build_package
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    
    steps:
      - uses: actions/checkout@v6
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon-x11-0 libpulse0
      - name: install package
        uses: ./.github/actions/setup_test
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/base
          uv run pytest tests/unit_tests/logic/*
          uv run pytest tests/unit_tests/mountcontrol
          uv run pytest tests/unit_tests/gui/utilities
          uv run pytest tests/unit_tests/gui/styles
        
  run_tests_ubuntu_1:
    needs: build_package
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    
    steps:
      - uses: actions/checkout@v6
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa libxkbcommon-x11-0 libpulse0
      - name: install package
        uses: ./.github/actions/setup_test
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/gui/extWindows/video
          uv run pytest tests/unit_tests/gui/extWindows/image
          uv run pytest tests/unit_tests/gui/extWindows/hemisphere
          uv run pytest tests/unit_tests/gui/extWindows/simulator

  run_tests_ubuntu_2:
    needs: build_package
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    
    steps:
      - uses: actions/checkout@v6
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon-x11-0 libpulse0
      - name: install package
        uses: ./.github/actions/setup_test
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/gui/mainWaddon
          uv run pytest tests/unit_tests/gui/extWindows
          uv run pytest tests/unit_tests/gui/mainWindow

  run_tests_ubuntu_3:
    needs: build_package
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    
    steps:
      - uses: actions/checkout@v6
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon-x11-0 libpulse0
      - name: install package
        uses: ./.github/actions/setup_test
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/mainApp
