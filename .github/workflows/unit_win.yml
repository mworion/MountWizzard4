name: unit_win

concurrency:
  group: "${{ github.ref }}-${{ github.workflow }}"
  cancel-in-progress: true

env:
  cov: '--cov --cov-append --cov-config=pyproject.toml'

on:
  push:
    # Run this action on the trigger event when specific files are touched
    paths:
      - 'src/mw4/**'
      - 'tests/unit_tests/**'
      - 'pyproject.toml'
      - '.github/workflows/unit_win.yml'
      - '.github/actions/build_package_uv/action.yml'
      - '.github/actions/setup_test/action.yml'
      - '.github/actions/setup_test_cov/action.yml'

jobs:
  build_package:
    #
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v6
      
      - name: build package
        uses: ./.github/actions/build_package_uv

  run_tests_windows_0:
    #
    needs: build_package
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: install package
        uses: ./.github/actions/setup_test_cov
  
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/mainApp ${{env.cov}}

      - name: rename_coveragefile
        run: mv .coverage c0.dat
      
      - uses: actions/upload-artifact@v6
        with:
          name: c0
          path: c0.dat
  
  run_tests_windows_1:
    #
    needs: build_package
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: install package
        uses: ./.github/actions/setup_test_cov
  
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/gui/mainWindow ${{env.cov}}

      - name: rename_coveragefile
        run: mv .coverage c1.dat
      
      - uses: actions/upload-artifact@v6
        with:
          name: c1
          path: c1.dat

  run_tests_windows_2:
    #
    needs: build_package
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: install package
        uses: ./.github/actions/setup_test_cov

      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/base ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv run pytest tests/unit_tests/logic ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv run pytest tests/unit_tests/mountcontrol ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: rename_coveragefile
        run: |
          mv .coverage .coverage.combined
          uv run coverage combine
          mv .coverage c2.dat

      - uses: actions/upload-artifact@v6
        with:
          name: c2
          path: c2.dat
          overwrite: true

  run_tests_windows_3:
    #
    needs: build_package
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v6
  
      - name: install package
        uses: ./.github/actions/setup_test_cov
  
      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/gui/extWindows ${{env.cov}}

      - name: rename_coveragefile
        run: mv .coverage c3.dat
      
      - uses: actions/upload-artifact@v6
        with:
          name: c3
          path: c3.dat

  run_tests_windows_4:
    #
    needs: build_package
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: install package
        uses: ./.github/actions/setup_test_cov

      - name: running_unit_tests
        run: |
          uv run pytest tests/unit_tests/gui/utilities ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv run pytest tests/unit_tests/gui/styles ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv run pytest tests/unit_tests/gui/mainWaddon ${{env.cov}}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: rename_coveragefile
        run: |
          mv .coverage .coverage.combined
          uv run coverage combine
          mv .coverage c4.dat

      - uses: actions/upload-artifact@v6
        with:
          name: c4
          path: c4.dat
          overwrite: true

          
  coverage:
    #
    needs: [ run_tests_windows_0, run_tests_windows_1,
             run_tests_windows_2, run_tests_windows_3, run_tests_windows_4]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{env.branch}}

    - name: install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - uses: actions/download-artifact@v7
      with:
        name: c0
    - uses: actions/download-artifact@v7
      with:
        name: c1
    - uses: actions/download-artifact@v7
      with:
        name: c2
    - uses: actions/download-artifact@v7
      with:
        name: c3
    - uses: actions/download-artifact@v7
      with:
        name: c4

    - name: combining_data
      run: |
        dir
        uv venv -p 3.14
        uv pip install coverage
        uv run coverage combine c0.dat c1.dat c2.dat c3.dat c4.dat
        uv run coverage xml

    - name: upload
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: coverage.xml
        flags: unittests
        name: codecov-umbrella
        env_vars: OS,PYTHON
        override_branch: ${{env.branch}}
